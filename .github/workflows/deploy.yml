name: Test and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update CloudFront function
        run: |
          grep -v 'export {' function.js > function.deploy.js

          ETAG=$(aws cloudfront describe-function \
            --name "${{ secrets.CLOUDFRONT_FUNCTION_NAME }}" \
            --query 'ETag' --output text)

          aws cloudfront update-function \
            --name "${{ secrets.CLOUDFRONT_FUNCTION_NAME }}" \
            --function-code fileb://function.deploy.js \
            --function-config Runtime=cloudfront-js-2.0,Comment="" \
            --if-match "$ETAG"

      - name: Publish CloudFront function
        run: |
          ETAG=$(aws cloudfront describe-function \
            --name "${{ secrets.CLOUDFRONT_FUNCTION_NAME }}" \
            --query 'ETag' --output text)

          aws cloudfront publish-function \
            --name "${{ secrets.CLOUDFRONT_FUNCTION_NAME }}" \
            --if-match "$ETAG"
